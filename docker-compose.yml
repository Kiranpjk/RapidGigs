version: '3.8'

services:
  # ─── MongoDB ───────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    # DO NOT expose in production — use Docker network only
    expose:
      - "27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-net

  # ─── Backend API ───────────────────────────────────────────────────────────
  backend:
    build: ./backend
    ports:
      - "3001:3001"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/rapidgig
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:?You must set JWT_SECRET in your environment}
      - JWT_EXPIRES_IN=7d
      - HELIOS_SERVICE_URL=http://helios:8000
      - HUGGINGFACE_TOKEN=${HUGGINGFACE_TOKEN:-}
      - HF_TEXT_MODEL=${HF_TEXT_MODEL:-HuggingFaceH4/zephyr-7b-beta}
      - HF_VIDEO_MODEL=${HF_VIDEO_MODEL:-ali-vilab/text-to-video-ms-1.7b}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:5173,http://localhost:80,http://localhost}
      - N8N_WEBHOOK_SECRET=${N8N_WEBHOOK_SECRET:?You must set N8N_WEBHOOK_SECRET in your environment}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-http://localhost:5173/api/auth/google/callback}
    volumes:
      - uploads:/app/uploads
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Frontend (Nginx) ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: /api
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  # ─── Helios AI Service (GPU required, optional) ───────────────────────────
  helios:
    build: ./ai-services/helios
    ports:
      - "8000:8000"
    volumes:
      - helios-outputs:/app/outputs
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    profiles:
      - gpu
    restart: unless-stopped

  # ─── n8n Workflow Automation (optional) ────────────────────────────────────
  n8n:
    image: n8nio/n8n:1.70.0
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://backend:3001
      - N8N_WEBHOOK_SECRET=${N8N_WEBHOOK_SECRET:-rapidgig-webhook-secret}
    volumes:
      - n8n-data:/home/node/.n8n
    depends_on:
      - backend
    profiles:
      - automation
    restart: unless-stopped

volumes:
  mongo-data:
  uploads:
  helios-outputs:
  n8n-data:
